<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To-Do List App</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>To-Do List</h1>
    <p class="subtitle">Project Akhir Komputasi Awan</p>

    <form id="task-form">
      <input type="text" id="task-input" placeholder="Tulis tugas baru..." required>
      <button type="submit">Tambah</button>
    </form>

    <ul id="task-list"></ul>
    <p id="empty-state" class="empty-state" hidden>Belum ada tugas. Tambahkan satu di atas!</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
